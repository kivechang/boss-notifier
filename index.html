<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>天堂M 王提醒管理器</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body { font-family: system-ui, -apple-system, sans-serif; }
        .time-link {
            color: #3b82f6;
            text-decoration: underline;
            cursor: pointer;
        }
        table { border-collapse: collapse; }
        th, td { border: 1px solid #e5e7eb; padding: 12px; text-align: left; }
        th { background-color: #f8fafc; }
    </style>
</head>
<body class="bg-gray-50 min-h-screen py-8">
    <div class="max-w-5xl mx-auto px-4">

        <div class="flex items-center gap-3 mb-8">
            <div class="w-10 h-10 bg-blue-600 rounded-xl flex items-center justify-center text-white text-2xl">👑</div>
            <h1 class="text-3xl font-bold text-gray-800">天堂M 王提醒管理器</h1>
            <span class="text-sm px-3 py-1 bg-blue-100 text-blue-700 rounded-full"></span>
        </div>


        <div class="bg-white rounded-2xl shadow p-6 mb-8">
            <h2 class="text-xl font-semibold mb-4 flex items-center gap-2">
                <span>新增王提醒</span>
            </h2>
            <div class="grid grid-cols-1 md:grid-cols-4 gap-4">
                <div>
                    <label class="block text-sm font-medium text-gray-700 mb-1">王的名字</label>
                    <input id="bossName" 
                           type="text" 
                           placeholder="胖 / 紅王 / 卡爾迪修"
                           class="w-full border border-gray-300 rounded-xl px-4 py-3 focus:outline-none focus:border-blue-500">
                </div>

                <div>
                    <label class="block text-sm font-medium text-gray-700 mb-1">擊殺時間</label>
                    <input id="killTime" 
                           type="text" 
                           placeholder="1500 或 15:00"
                           class="w-full border border-gray-300 rounded-xl px-4 py-3 focus:outline-none focus:border-blue-500">
                </div>

                <div>
                    <label class="block text-sm font-medium text-gray-700 mb-1">重生間隔（小時）</label>
                    <div class="flex items-center gap-2">
                        <input id="interval" 
                               type="number" 
                               value="4"
                               min="1"
                               class="w-full border border-gray-300 rounded-xl px-4 py-3 focus:outline-none focus:border-blue-500">
                        <span class="text-gray-500 font-medium">小時</span>
                    </div>
                </div>

                <div class="flex items-end">
                    <button onclick="addBoss()"
                            class="w-full bg-blue-600 hover:bg-blue-700 text-white font-semibold py-3.5 rounded-2xl transition-all active:scale-95">
                        ✅ 設定提醒
                    </button>
                </div>
            </div>
        </div>

        <div class="bg-white rounded-2xl shadow overflow-hidden">
            <div class="px-6 py-4 border-b flex items-center justify-between">
                <h2 class="text-xl font-semibold">目前所有王提醒</h2>
                <div class="flex items-center gap-3">
                    <button onclick="exportJSON()" 
                            class="text-sm px-4 py-2 bg-gray-100 hover:bg-gray-200 rounded-xl flex items-center gap-1">
                        📤 匯出 JSON
                    </button>
                    <button onclick="clearAll()" 
                            class="text-sm px-4 py-2 bg-red-100 hover:bg-red-200 text-red-700 rounded-xl">
                        🗑️ 清空全部
                    </button>
                </div>
            </div>
            
            <table class="w-full text-sm" id="bossTable">
                <thead>
                    <tr class="bg-slate-50">
                        <th class="w-12">功能</th>
                        <th class="w-32">擊殺時間</th>
                        <th class="w-40">重生時間</th>
                        <th>內容（王名）</th>
                        <th class="w-24 text-center">剩餘</th>
                    </tr>
                </thead>
                <tbody id="tableBody" class="divide-y"></tbody>
            </table>

            <div id="emptyState" class="hidden px-6 py-12 text-center text-gray-400">
                目前沒有任何王提醒<br>請在上方新增第一筆資料
            </div>
        </div>

        <p class="text-center text-xs text-gray-400 mt-8">
            
        </p>
    </div>

    <script>
        let bosses = JSON.parse(localStorage.getItem('heavenMBosses')) || [];


        function parseKillTime(timeStr) {
            const now = new Date();
            let hour, minute;
            
            if (timeStr.includes(':')) {
                [hour, minute] = timeStr.split(':').map(Number);
            } else {
                const num = parseInt(timeStr);
                hour = Math.floor(num / 100);
                minute = num % 100;
            }
            
            const killDate = new Date(now.getFullYear(), now.getMonth(), now.getDate(), hour, minute, 0, 0);
            return killDate;
        }


        window.addBoss = function() {
            const name = document.getElementById('bossName').value.trim();
            const killStr = document.getElementById('killTime').value.trim();
            const interval = parseInt(document.getElementById('interval').value);

            if (!name || !killStr || isNaN(interval)) {
                alert('請填寫完整資料！');
                return;
            }

            const killTime = parseKillTime(killStr);
            const respawnTime = new Date(killTime.getTime() + interval * 60 * 60 * 1000);

            const newBoss = {
                id: Date.now(),
                name: name,
                killStr: killStr,
                interval: interval,
                killTimeISO: killTime.toISOString(),
                respawnTimeISO: respawnTime.toISOString()
            };

            bosses.unshift(newBoss);
            localStorage.setItem('heavenMBosses', JSON.stringify(bosses));
            

            document.getElementById('bossName').value = '';
            document.getElementById('killTime').value = '';
            
            renderTable();
            
   
            const successMsg = document.createElement('div');
            successMsg.className = 'fixed bottom-4 right-4 bg-white shadow-2xl rounded-2xl p-4 max-w-xs border border-blue-200 flex items-center gap-3';
            successMsg.innerHTML = `
                <div>
                    <div class="text-green-600 font-semibold">✅ 設定成功</div>
                    <div class="text-gray-600 text-sm">將於 <span class="time-link">${respawnTime.toLocaleString('zh-TW', {month:'2-digit', day:'2-digit', hour:'2-digit', minute:'2-digit'})}</span> 提醒</div>
                    <div class="text-xs text-gray-400">已記錄「${name}」 ${interval}小時後</div>
                </div>
            `;
            document.body.appendChild(successMsg);
            setTimeout(() => successMsg.remove(), 4000);
        };

 
        function renderTable() {
            const tbody = document.getElementById('tableBody');
            const empty = document.getElementById('emptyState');
            tbody.innerHTML = '';

            if (bosses.length === 0) {
                empty.classList.remove('hidden');
                return;
            }
            empty.classList.add('hidden');

            bosses.forEach(boss => {
                const killDate = new Date(boss.killTimeISO);
                const respawnDate = new Date(boss.respawnTimeISO);
                
             
                const now = new Date();
                let remainingHTML = '';
                const diffMs = respawnDate - now;
                
                if (diffMs > 0) {
                    const hours = Math.floor(diffMs / (1000 * 60 * 60));
                    const minutes = Math.floor((diffMs % (1000 * 60 * 60)) / (1000 * 60));
                    remainingHTML = `<span class="text-emerald-600 font-medium">${hours}h ${minutes}m</span>`;
                } else {
                    remainingHTML = `<span class="text-red-500 text-xs">已到期</span>`;
                }

                const row = document.createElement('tr');
                row.className = 'hover:bg-blue-50 transition-colors';
                row.innerHTML = `
                    <td>
                        <button onclick="deleteBoss(${boss.id})" 
                                class="text-red-500 hover:text-red-700 font-medium text-xs px-3 py-1 border border-red-200 rounded-lg hover:bg-red-50">
                            刪除
                        </button>
                    </td>
                    <td class="font-mono">${killDate.getHours().toString().padStart(2,'0')}:${killDate.getMinutes().toString().padStart(2,'0')}</td>
                    <td class="font-mono text-blue-600">${respawnDate.getHours().toString().padStart(2,'0')}:${respawnDate.getMinutes().toString().padStart(2,'0')}</td>
                    <td class="font-medium">${boss.name}</td>
                    <td class="text-center">${remainingHTML}</td>
                `;
                tbody.appendChild(row);
            });
        }


        window.deleteBoss = function(id) {
            if (confirm('確定要刪除這筆王提醒嗎？')) {
                bosses = bosses.filter(b => b.id !== id);
                localStorage.setItem('heavenMBosses', JSON.stringify(bosses));
                renderTable();
            }
        };


        window.clearAll = function() {
            if (confirm('確定要清除全部王提醒嗎？此動作無法復原！')) {
                bosses = [];
                localStorage.setItem('heavenMBosses', JSON.stringify(bosses));
                renderTable();
            }
        };


        window.exportJSON = function() {
            const dataStr = JSON.stringify(bosses, null, 2);
            const blob = new Blob([dataStr], { type: 'application/json' });
            const url = URL.createObjectURL(blob);
            const a = document.createElement('a');
            a.href = url;
            a.download = `天堂M王提醒_${new Date().toISOString().slice(0,10)}.json`;
            a.click();
            URL.revokeObjectURL(url);
           
        };


        function startLiveUpdate() {
            setInterval(() => {
                if (document.getElementById('tableBody').children.length > 0) {
                    renderTable();
                }
            }, 30000);
        }


        window.onload = function() {
            renderTable();
            startLiveUpdate();
            

            const inputs = document.querySelectorAll('input');
            inputs.forEach(input => {
                input.addEventListener('keypress', e => {
                    if (e.key === 'Enter') addBoss();
                });
            });
            
            console.log('%c🌟 天堂M 王提醒管理器已啟動！', 'color:#3b82f6; font-weight:bold');
        };
    </script>
</body>
</html>
