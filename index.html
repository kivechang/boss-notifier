<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>天堂M 王提醒管理器 - 除錯版</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body { font-family: system-ui, -apple-system, sans-serif; }
        th, td { border: 1px solid #e5e7eb; padding: 12px; }
        th { background-color: #f8fafc; }
    </style>
</head>
<body class="bg-gray-50 min-h-screen py-8">
    <div class="max-w-4xl mx-auto px-4">
        <h1 class="text-3xl font-bold text-center mb-8">🌟 天堂M 王提醒管理器（除錯版）</h1>

        <!-- 除錯資訊區 -->
        <div class="bg-gray-900 text-green-400 p-4 rounded-xl mb-6 font-mono text-sm" id="debugInfo">
            通知權限狀態：載入中...
        </div>

        <!-- 測試按鈕 -->
        <div class="bg-white rounded-2xl shadow p-6 mb-8">
            <button onclick="testNotification()" 
                    class="w-full bg-green-600 hover:bg-green-700 text-white font-bold py-4 rounded-2xl text-lg">
                🔧 強制測試通知（點這個看有沒有跳）
            </button>
        </div>

        <!-- 新增王表單 -->
        <div class="bg-white rounded-2xl shadow p-6 mb-8">
            <h2 class="text-xl font-semibold mb-4">新增王提醒</h2>
            <div class="grid grid-cols-1 md:grid-cols-4 gap-4">
                <div>
                    <label class="block text-sm mb-1">王的名字</label>
                    <input id="bossName" type="text" placeholder="胖" class="w-full border rounded-xl px-4 py-3">
                </div>
                <div>
                    <label class="block text-sm mb-1">擊殺時間</label>
                    <input id="killTime" type="text" placeholder="1500" class="w-full border rounded-xl px-4 py-3">
                </div>
                <div>
                    <label class="block text-sm mb-1">重生間隔</label>
                    <input id="interval" type="number" value="4" min="1" class="w-full border rounded-xl px-4 py-3">
                </div>
                <div class="flex items-end">
                    <button onclick="addBoss()" 
                            class="w-full bg-blue-600 hover:bg-blue-700 text-white font-bold py-4 rounded-2xl">
                        ✅ 設定提醒
                    </button>
                </div>
            </div>
        </div>

        <div class="text-center text-sm text-gray-500">
            目前通知權限：<span id="permissionStatus" class="font-mono font-bold"></span>
        </div>
    </div>

    <script>
        let bosses = JSON.parse(localStorage.getItem('heavenMBossesNotify')) || [];

        // 更新除錯資訊
        function updateDebug() {
            const status = document.getElementById('permissionStatus');
            const debug = document.getElementById('debugInfo');
            status.textContent = Notification.permission;
            debug.innerHTML = `
                通知權限：${Notification.permission}<br>
                支援通知：${"Notification" in window ? "是" : "否"}<br>
                目前時間：${new Date().toLocaleTimeString('zh-TW')}
            `;
        }

        // 強制測試通知
        window.testNotification = async function() {
            console.log("=== 測試通知開始 ===");
            updateDebug();

            if (!("Notification" in window)) {
                alert("瀏覽器不支援 Notification API");
                return;
            }

            if (Notification.permission !== "granted") {
                const perm = await Notification.requestPermission();
                console.log("請求權限結果：", perm);
                updateDebug();
            }

            // 直接發送通知
            try {
                const notification = new Notification("🧪 測試通知", {
                    body: "如果看到這則通知，表示通知功能正常！\n點擊我可以回到網頁",
                    icon: "https://cdn-icons-png.flaticon.com/512/3063/3063176.png",
                    tag: "test-" + Date.now()
                });

                console.log("通知物件已建立", notification);

                notification.onclick = () => {
                    window.focus();
                    console.log("通知被點擊");
                };

                alert("✅ 已嘗試發送測試通知！\n請檢查桌面右下角是否有跳出通知");
            } catch (err) {
                console.error("發送通知失敗：", err);
                alert("發送通知時發生錯誤：" + err.message);
            }
        };

        // 新增王
        window.addBoss = function() {
            const name = document.getElementById('bossName').value.trim();
            const killStr = document.getElementById('killTime').value.trim();
            const interval = parseInt(document.getElementById('interval').value);

            if (!name || !killStr || isNaN(interval)) {
                alert("請填寫完整資料！");
                return;
            }

            console.log("新增王：", name, killStr, interval);

            const now = new Date();
            let hour = parseInt(killStr.slice(0, -2));
            let min = parseInt(killStr.slice(-2));
            if (killStr.includes(':')) {
                [hour, min] = killStr.split(':').map(Number);
            }

            const killTime = new Date(now.getFullYear(), now.getMonth(), now.getDate(), hour, min);
            const respawnTime = new Date(killTime.getTime() + interval * 60 * 60 * 1000);

            bosses.unshift({
                id: Date.now(),
                name: name,
                respawnTimeISO: respawnTime.toISOString(),
                notified: false
            });

            localStorage.setItem('heavenMBossesNotify', JSON.stringify(bosses));
            
            document.getElementById('bossName').value = '';
            document.getElementById('killTime').value = '';

            alert(`✅ 已新增「${name}」，重生時間 ${respawnTime.getHours().toString().padStart(2, '0')}:${respawnTime.getMinutes().toString().padStart(2, '0')}`);
            console.log("新增成功，目前有", bosses.length, "筆資料");
        };

        // 初始化
        window.onload = function() {
            updateDebug();
            console.log("網頁已載入，當前權限：", Notification.permission);
            
            // 每 5 秒更新除錯資訊
            setInterval(updateDebug, 5000);
        };
    </script>
</body>
</html>
