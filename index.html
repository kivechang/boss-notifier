<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <!-- Google tag (gtag.js) - 你已經加好的 GA4 -->
    <script async src="https://www.googletagmanager.com/gtag/js?id=G-F481D4F8CP"></script>
    <script>
      window.dataLayer = window.dataLayer || [];
      function gtag(){dataLayer.push(arguments);}
      gtag('js', new Date());
      gtag('config', 'G-F481D4F8CP');
    </script>

    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>天堂M 王提醒管理器</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body { font-family: system-ui, -apple-system, sans-serif; }
        th, td { border: 1px solid #e5e7eb; padding: 12px; text-align: left; }
        th { background-color: #f8fafc; }
    </style>
</head>
<body class="bg-gray-50 min-h-screen py-8">
    <div class="max-w-6xl mx-auto px-4">
        <div class="flex items-center gap-3 mb-8">
            <div class="w-12 h-12 bg-blue-600 rounded-2xl flex items-center justify-center text-white text-3xl">👑</div>
            <h1 class="text-3xl font-bold text-gray-800">天堂M 王提醒管理器（自動延續版）</h1>
        </div>

        <!-- 工具列 -->
        <div class="bg-white rounded-3xl shadow p-4 mb-6 flex flex-wrap gap-3">
            <button onclick="importJSON()" class="bg-green-600 hover:bg-green-700 text-white px-5 py-2.5 rounded-2xl flex items-center gap-2">📥 匯入 JSON</button>
            <button onclick="exportJSON()" class="bg-gray-600 hover:bg-gray-700 text-white px-5 py-2.5 rounded-2xl flex items-center gap-2">📤 匯出 JSON</button>
            <button onclick="clearAll()" class="bg-red-600 hover:bg-red-700 text-white px-5 py-2.5 rounded-2xl flex items-center gap-2">🗑️ 清空全部</button>
        </div>

        <!-- 新增表單 -->
        <div class="bg-white rounded-3xl shadow-lg p-6 mb-8">
            <h2 class="text-xl font-semibold mb-4">新增 / 更新王提醒</h2>
            <div class="grid grid-cols-1 md:grid-cols-4 gap-4">
                <div>
                    <label class="block text-sm font-medium text-gray-700 mb-1">王的名字</label>
                    <input id="bossName" type="text" placeholder="胖 / 紅王" class="w-full border border-gray-300 rounded-2xl px-4 py-3">
                </div>
                <div>
                    <label class="block text-sm font-medium text-gray-700 mb-1">擊殺時間</label>
                    <input id="killTime" type="text" placeholder="1500 或 15:00" class="w-full border border-gray-300 rounded-2xl px-4 py-3">
                </div>
                <div>
                    <label class="block text-sm font-medium text-gray-700 mb-1">重生間隔（小時）</label>
                    <input id="interval" type="number" value="4" min="0.1" step="0.1" class="w-full border border-gray-300 rounded-2xl px-4 py-3">
                </div>
                <div class="flex items-end">
                    <button onclick="addBoss()" class="w-full bg-blue-600 hover:bg-blue-700 text-white font-semibold py-4 rounded-2xl">✅ 設定提醒</button>
                </div>
            </div>
        </div>

        <!-- 王列表 -->
        <div class="bg-white rounded-3xl shadow-lg overflow-hidden">
            <div class="px-6 py-5 border-b bg-slate-50">
                <h2 class="text-xl font-semibold">王提醒列表（支援自動延續）</h2>
            </div>
            <table class="w-full text-sm">
                <thead>
                    <tr class="bg-slate-50">
                        <th class="w-28">功能</th>
                        <th class="w-32">上次擊殺</th>
                        <th class="w-40">下次重生</th>
                        <th>王名</th>
                        <th class="w-32 text-center">剩餘時間</th>
                    </tr>
                </thead>
                <tbody id="tableBody" class="divide-y"></tbody>
            </table>
            <div id="emptyState" class="hidden py-16 text-center text-gray-400">
                尚未新增任何王提醒
            </div>
        </div>
    </div>

    <input type="file" id="importFile" accept=".json" class="hidden" onchange="handleFileSelect(event)">

    <script>
        const STORAGE_KEY = 'heavenMBossesAuto';
        let bosses = JSON.parse(localStorage.getItem(STORAGE_KEY)) || [];

        function parseKillTime(timeStr) {
            const now = new Date();
            let hour = 0, minute = 0;
            if (timeStr.includes(':')) {
                [hour, minute] = timeStr.split(':').map(Number);
            } else {
                const num = parseInt(timeStr);
                hour = Math.floor(num / 100);
                minute = num % 100;
            }
            return new Date(now.getFullYear(), now.getMonth(), now.getDate(), hour, minute);
        }

        function sendNotification(bossName) {
            if (Notification.permission === "granted") {
                new Notification(`⏰ 天堂M 王提醒`, {
                    body: `${bossName} 的時間到了！\n已自動延續下一次`,
                    icon: "https://cdn-icons-png.flaticon.com/512/3063/3063176.png"
                });
            }
        }

        function getRemainingTime(respawnISO) {
            const now = new Date();
            const respawn = new Date(respawnISO);
            let diffMs = respawn - now;
            if (diffMs <= 0) return '<span class="text-red-500 font-medium">已到期</span>';

            const totalMinutes = Math.floor(diffMs / 60000);
            const hours = Math.floor(totalMinutes / 60);
            const minutes = totalMinutes % 60;

            if (hours > 0) return `<span class="text-emerald-600 font-medium">${hours}h ${minutes}m</span>`;
            return `<span class="text-emerald-600 font-medium">${minutes}m</span>`;
        }

        window.addBoss = function() {
            const name = document.getElementById('bossName').value.trim();
            const killStr = document.getElementById('killTime').value.trim();
            const interval = parseFloat(document.getElementById('interval').value);

            if (!name || !killStr || isNaN(interval)) {
                alert('請填寫完整資料！');
                return;
            }

            const killTime = parseKillTime(killStr);
            const respawnTime = new Date(killTime.getTime() + interval * 60 * 60 * 1000);

            const existing = bosses.findIndex(b => b.name.toLowerCase() === name.toLowerCase());
            if (existing !== -1) {
                bosses[existing].killTimeISO = killTime.toISOString();
                bosses[existing].respawnTimeISO = respawnTime.toISOString();
                bosses[existing].interval = interval;
            } else {
                bosses.unshift({
                    id: Date.now(),
                    name: name,
                    killTimeISO: killTime.toISOString(),
                    respawnTimeISO: respawnTime.toISOString(),
                    interval: interval,
                    notified: false
                });
            }

            localStorage.setItem(STORAGE_KEY, JSON.stringify(bosses));
            document.getElementById('bossName').value = '';
            document.getElementById('killTime').value = '';
            renderTable();
        };

        window.markAsKilled = function(id) {
            const boss = bosses.find(b => b.id === id);
            if (!boss) return;
            const now = new Date();
            const nextRespawn = new Date(now.getTime() + boss.interval * 60 * 60 * 1000);

            boss.killTimeISO = now.toISOString();
            boss.respawnTimeISO = nextRespawn.toISOString();
            boss.notified = false;

            localStorage.setItem(STORAGE_KEY, JSON.stringify(bosses));
            renderTable();
        };

        function renderTable() {
            const tbody = document.getElementById('tableBody');
            tbody.innerHTML = '';

            if (bosses.length === 0) {
                document.getElementById('emptyState').classList.remove('hidden');
                return;
            }
            document.getElementById('emptyState').classList.add('hidden');

            bosses.forEach(boss => {
                const row = document.createElement('tr');
                row.innerHTML = `
                    <td>
                        <button onclick="markAsKilled(${boss.id})" class="bg-green-600 hover:bg-green-700 text-white text-xs px-4 py-1.5 rounded-xl mr-2">已擊殺</button>
                        <button onclick="deleteBoss(${boss.id})" class="text-red-500 hover:text-red-700 text-xs px-3 py-1 border rounded">刪除</button>
                    </td>
                    <td class="font-mono">${new Date(boss.killTimeISO).toLocaleTimeString('zh-TW', {hour:'numeric', minute:'2-digit', hour12:true})}</td>
                    <td class="font-mono text-blue-600">${new Date(boss.respawnTimeISO).toLocaleTimeString('zh-TW', {hour:'numeric', minute:'2-digit', hour12:true})}</td>
                    <td class="font-medium">${boss.name}</td>
                    <td class="text-center">${getRemainingTime(boss.respawnTimeISO)}</td>
                `;
                tbody.appendChild(row);
            });
        };

        window.deleteBoss = function(id) {
            if (confirm('確定刪除這筆？')) {
                bosses = bosses.filter(b => b.id !== id);
                localStorage.setItem(STORAGE_KEY, JSON.stringify(bosses));
                renderTable();
            }
        };

        window.exportJSON = function() {
            const dataStr = JSON.stringify(bosses, null, 2);
            const blob = new Blob([dataStr], { type: 'application/json' });
            const url = URL.createObjectURL(blob);
            const a = document.createElement('a');
            a.href = url;
            a.download = `天堂M王提醒_${new Date().toISOString().slice(0,10)}.json`;
            a.click();
        };

        window.importJSON = function() { document.getElementById('importFile').click(); };

        window.handleFileSelect = function(e) {
            const file = e.target.files[0];
            if (!file) return;
            const reader = new FileReader();
            reader.onload = function(ev) {
                try {
                    const data = JSON.parse(ev.target.result);
                    data.forEach(item => {
                        const idx = bosses.findIndex(b => b.name.toLowerCase() === (item.name || '').toLowerCase());
                        if (idx !== -1) bosses[idx] = {...bosses[idx], ...item};
                        else bosses.push(item);
                    });
                    localStorage.setItem(STORAGE_KEY, JSON.stringify(bosses));
                    renderTable();
                    alert(`✅ 成功匯入 ${data.length} 筆資料！`);
                } catch(err) { alert('匯入失敗：檔案格式錯誤'); }
            };
            reader.readAsText(file);
        };

        window.clearAll = function() {
            if (confirm('確定清空全部資料？')) {
                bosses = [];
                localStorage.setItem(STORAGE_KEY, JSON.stringify(bosses));
                renderTable();
            }
        };

        setInterval(renderTable, 30000);

        window.onload = function() {
            renderTable();
            console.log('✅ 天堂M 王提醒管理器 + GA4 已啟動');
        };
    </script>
</body>
</html>
